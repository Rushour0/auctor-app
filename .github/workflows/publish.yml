name: publish-images

# Build + push both images to GHCR on every push to main (continuous deploy,
# no release-tag gate — per the founder's "continuous deployment, no
# deployment checks" call). No smoke-test job: Coolify's own container
# healthcheck (see docker-compose.yaml) is the only gate.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        include:
          - name: service
            dockerfile: docker/service.Dockerfile
          - name: frontend
            dockerfile: docker/frontend.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: image tags
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          base="ghcr.io/${owner_lc}/auctor-${{ matrix.name }}"
          echo "tags=${base}:latest,${base}:sha-${short}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: trigger coolify deploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [[ -z "${WEBHOOK}" ]]; then
            echo "COOLIFY_DEPLOY_URL not set — skipping deploy."
            exit 0
          fi
          echo "::group::coolify deploy"
          echo "endpoint=${WEBHOOK%%\?*}"
          if [[ -n "${COOLIFY_API_TOKEN}" ]]; then
            RESP=$(curl -sS "${WEBHOOK}" -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" -w '\n__HTTP__%{http_code}')
          else
            RESP=$(curl -sS "${WEBHOOK}" -w '\n__HTTP__%{http_code}')
          fi
          CODE="${RESP##*__HTTP__}"; BODY="${RESP%$'\n'__HTTP__*}"
          echo "response: ${BODY}"
          echo "http: ${CODE}"
          echo "::endgroup::"
          if [[ "${CODE}" != 2* ]]; then
            echo "::error::Coolify deploy failed (HTTP ${CODE})."
            exit 1
          fi
          echo "coolify deploy queued ✓"
