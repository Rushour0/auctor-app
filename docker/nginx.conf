server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        proxy_pass http://service:8000;
    }
    location /version {
        proxy_pass http://service:8000;
    }
    location /api/ {
        proxy_pass http://service:8000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
